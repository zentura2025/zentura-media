<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        #chat-box { border: 1px solid #333; padding: 15px; max-width: 500px; border-radius: 8px; }
        input { width: 80%; padding: 8px; background: #222; color: #fff; border: 1px solid #444; }
        button { padding: 8px; cursor: pointer; background: #0070f3; color: white; border: none; }
        #output { margin-top: 20px; line-height: 1.5; color: #00ffcc; }
    </style>
</head>
<body>

    <h2>Zentura AI Explorer</h2>
    <div id="chat-box">
        <input type="text" id="userInput" placeholder="Ask me something...">
        <button onclick="askAI()">Ask</button>
        <div id="output">Response will appear here...</div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput').value;
            const outputDiv = document.getElementById('output');
            
            outputDiv.innerText = "Thinking...";

            try {
                // This connects directly to your new worker
                const response = await fetch(`https://twilight-hall-d61a.zentura.workers.dev/ask=${encodeURIComponent(input)}`);
                const data = await response.json();
                
                // We pull the "response" field from your JSON
                outputDiv.innerText = data.response;
            } catch (error) {
                outputDiv.innerText = "Error connecting to the worker.";
                console.error(error);
            }
        }
    </script>

</body>
</html>
