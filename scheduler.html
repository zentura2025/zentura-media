<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scheduler — Zentura</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0f11;
  --surface:#16181c;
  --surface2:#1e2126;
  --border:#2a2d33;
  --border2:#363a42;
  --text:#e8eaf0;
  --text2:#8b9099;
  --text3:#555b66;
  --accent:#4f9cf9;
  --accent-dim:#1a3a5c;
  --green:#3ecf8e;
  --amber:#f5a623;
  --red:#f06060;
  --red-dim:#3d1515;
  --teal:#38d9a9;
  --radius:8px;
  --radius-lg:12px;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;line-height:1.5}
.shell{max-width:780px;margin:0 auto;padding:2rem 1.5rem}

/* header */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.header-left h1{font-size:28px;font-weight:800;letter-spacing:-.5px;font-family:'Montserrat',sans-serif;background:linear-gradient(90deg,#d400ff,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-left p{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:3px}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.save-pill{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:var(--text3);padding:4px 10px;border:1px solid var(--border);border-radius:20px}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--green);transition:background .3s}
.sync-badge{font-size:10px;font-family:var(--mono);padding:3px 9px;border:1px solid var(--border);border-radius:20px;color:var(--text3)}
.sync-badge.kv{border-color:var(--teal);color:var(--teal)}
.sync-badge.local{border-color:var(--amber);color:var(--amber)}
.sync-badge.err{border-color:var(--red);color:var(--red)}
.gear-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius);padding:4px 9px;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;transition:all .15s}
.gear-btn:hover{border-color:var(--border2);color:var(--text)}

/* config panel */
.config-panel{background:var(--surface);border:1px solid var(--amber);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;display:none}
.config-panel.open{display:block}
.config-panel h3{font-size:11px;font-family:var(--mono);color:var(--amber);margin-bottom:8px;letter-spacing:.08em;text-transform:uppercase}
.config-panel p{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.6}
.config-row{display:flex;gap:8px}
.config-panel input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;transition:border .15s}
.config-panel input:focus{border-color:var(--amber)}
.config-panel input::placeholder{color:var(--text3)}
.config-save{padding:8px 14px;background:transparent;border:1px solid var(--amber);border-radius:var(--radius);color:var(--amber);font-size:13px;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:all .15s}
.config-save:hover{background:var(--amber);color:#000}

/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--surface);border-radius:var(--radius);padding:3px;width:fit-content}
.tab{padding:6px 16px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--text2);border:none;background:transparent;font-family:var(--sans);transition:all .15s}
.tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.tab:hover:not(.active){color:var(--text)}

/* add bar */
.add-bar{display:flex;gap:8px;margin-bottom:1rem}
.add-bar input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 14px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;transition:border .15s}
.add-bar input:focus{border-color:var(--border2)}
.add-bar input::placeholder{color:var(--text3)}
.parse-btn{padding:9px 16px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius);color:var(--accent);font-size:13px;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:all .15s}
.parse-btn:hover{background:var(--accent);color:#fff}
.form-toggle{padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.form-toggle:hover{border-color:var(--border2);color:var(--text)}

/* quick form */
.quick-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;display:none;grid-template-columns:1fr 1fr;gap:10px}
.quick-form.open{display:grid}
.quick-form input,.quick-form select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;width:100%;transition:border .15s}
.quick-form input:focus,.quick-form select:focus{border-color:var(--border2)}
.quick-form input::placeholder{color:var(--text3)}
.quick-form select option{background:var(--surface2)}
.full{grid-column:1/-1}
.submit-btn{grid-column:1/-1;padding:9px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:13px;cursor:pointer;font-family:var(--sans);font-weight:500;transition:all .15s}
.submit-btn:hover{border-color:var(--accent);color:var(--accent)}

/* conflicts */
.conflict{background:var(--red-dim);border:1px solid var(--red);border-radius:var(--radius);padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:8px;font-family:var(--mono)}

/* section label */
.section-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin:1.5rem 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* event card */
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:border .15s}
.event-card:hover{border-color:var(--border2)}
.event-stripe{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:20px}
.event-body{flex:1;min-width:0}
.event-name{font-size:14px;font-weight:500;color:var(--text)}
.event-meta{font-size:12px;color:var(--text2);margin-top:3px;font-family:var(--mono)}
.event-loc{font-size:12px;color:var(--text3);margin-top:2px}
.event-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.type-pill{font-size:10px;padding:3px 9px;border-radius:20px;font-family:var(--mono);letter-spacing:.04em;font-weight:500;white-space:nowrap}
.del-btn{font-size:18px;color:var(--text3);cursor:pointer;line-height:1;padding:2px 5px;border-radius:4px;border:none;background:transparent;transition:color .15s}
.del-btn:hover{color:var(--red)}
.muted{opacity:0.35}
.empty{color:var(--text3);padding:2rem 0;font-family:var(--mono);font-size:13px}

/* calendar */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cal-nav button{padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:13px;font-family:var(--sans);transition:all .15s}
.cal-nav button:hover{border-color:var(--border2);color:var(--text)}
.cal-nav span{font-size:15px;font-weight:500;font-family:var(--mono)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-lbl{font-size:10px;color:var(--text3);text-align:center;font-family:var(--mono);padding:2px}
.day{min-height:58px;border:1px solid var(--border);border-radius:var(--radius);padding:6px;background:var(--surface);transition:border .15s}
.day.today{border-color:var(--accent);background:var(--accent-dim)}
.day.has-event{background:var(--surface2)}
.day.conflict-day{border-color:var(--red);background:var(--red-dim)}
.day-n{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:3px}
.day-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin:1px}

/* status bar */
.statusbar{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text3);font-family:var(--mono);padding:10px 0;border-top:1px solid var(--border);margin-top:1rem}

/* toast */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:12px;font-family:var(--mono);color:var(--text2);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
#toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">

<div class="header">
  <div class="header-left">
    <h1>Scheduler</h1>
    <p id="dateline">loading...</p>
  </div>
  <div class="header-right">
    <div class="save-pill">
      <span class="save-dot" id="save-dot"></span>
      <span id="save-txt">saved</span>
    </div>
    <span class="sync-badge local" id="sync-badge">⬡ local</span>
    <button class="gear-btn" onclick="toggleConfig()" title="Configure KV sync">⚙</button>
  </div>
</div>

<!-- KV config -->
<div class="config-panel" id="config-panel">
  <h3>☁ Cloudflare KV Sync</h3>
  <p>Paste your Worker URL to sync events across all devices. Saves automatically — falls back to local storage if offline.</p>
  <div class="config-row">
    <input type="text" id="worker-url-input" placeholder="https://scheduler-sync.zentura.workers.dev"/>
    <button class="config-save" onclick="saveWorkerUrl()">Save & Test</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-up" onclick="setView('upcoming')">Upcoming</button>
  <button class="tab" id="tab-cal" onclick="setView('calendar')">Calendar</button>
</div>

<div class="add-bar">
  <input type="text" id="nl" placeholder="Bush Red Hat April 14 — or New Orleans road trip April 18 — or Fenway August 31"
    onkeydown="if(event.key==='Enter')nlAdd()"/>
  <button class="parse-btn" onclick="nlAdd()">Parse ↗</button>
  <button class="form-toggle" onclick="toggleForm()">+ Form</button>
</div>

<div class="quick-form" id="qform">
  <input type="text" id="f-name" placeholder="Event name" class="full"/>
  <input type="date" id="f-start"/>
  <input type="date" id="f-end" placeholder="End date (optional)"/>
  <select id="f-type">
    <option value="concert">Concert / Show</option>
    <option value="sport">Sport / Race</option>
    <option value="flight">Flight</option>
    <option value="hotel">Hotel / Stay</option>
    <option value="roadtrip">Road Trip</option>
    <option value="explore">Explore</option>
    <option value="recon">Recon</option>
  </select>
  <input type="text" id="f-loc" placeholder="Location (optional)"/>
  <button class="submit-btn" onclick="addForm()">Add event</button>
</div>

<div id="conflicts"></div>
<div id="view"></div>

<div class="statusbar">
  <span id="status">loading...</span>
  <span id="last-saved"></span>
</div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const STORAGE_KEY    = 'dennis-scheduler-v1';
const WORKER_URL_KEY = 'dennis-scheduler-worker-url';
let WORKER_URL = localStorage.getItem(WORKER_URL_KEY) || '';

// ── TYPE DEFINITIONS ──────────────────────────────────────────────────────────
const TYPE_COLOR = {concert:'#a78bfa', sport:'#f5a623', flight:'#4f9cf9', hotel:'#3ecf8e', roadtrip:'#f07855', explore:'#38d9a9', recon:'#d400ff'};
const TYPE_BG    = {concert:'#2d1f5e', sport:'#3d2a0a', flight:'#1a3a5c', hotel:'#0d3327',  roadtrip:'#3d1e12', explore:'#0d3327', recon:'#2d0040'};
const TYPE_FG    = {concert:'#c4b5fd', sport:'#fbbf24', flight:'#93c5fd', hotel:'#6ee7b7',  roadtrip:'#fca58a', explore:'#6ee7b7', recon:'#f0a0ff'};
const TYPE_LABEL = {concert:'Concert', sport:'Sport',  flight:'Flight',  hotel:'Hotel',     roadtrip:'Road Trip', explore:'Explore', recon:'Recon'};

// ── STATE ─────────────────────────────────────────────────────────────────────
let events  = [];
let nextId  = 100;
let view    = 'upcoming';
let calY    = new Date().getFullYear();
let calM    = new Date().getMonth();
let saveTimer = null;

// Default events — your actual upcoming schedule
const DEFAULT = [
  {id:1, name:'Bush @ Red Hat Amphitheatre',       start:'2026-04-14', end:'2026-04-14', type:'concert',   loc:'Raleigh, NC'},
  {id:2, name:'Lamb of God @ The Roxie',           start:'2026-04-15', end:'2026-04-15', type:'concert',   loc:'Atlanta, GA'},
  {id:3, name:'Southern Road Trip',                start:'2026-04-14', end:'2026-04-21', type:'roadtrip',  loc:'NC → SC → GA → New Orleans → TN → KY'},
  {id:4, name:'New Orleans — French Quarter',      start:'2026-04-18', end:'2026-04-19', type:'hotel',     loc:'French Quarter, New Orleans'},
  {id:5, name:'Fenway Park — Red Sox vs Mariners', start:'2026-08-31', end:'2026-08-31', type:'race',      loc:'Boston, MA'},
  {id:6, name:'MLB East Coast Stadium Tour',       start:'2026-08-29', end:'2026-09-05', type:'roadtrip',  loc:'Boston → DC → Baltimore → Philadelphia'},
  {id:7, name:'Budget Rental Car — Boston',        start:'2026-08-29', end:'2026-09-05', type:'flight',    loc:'Boston Logan · Code D956200'},
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const ds  = d => d.toISOString().split('T')[0];
const pd  = s => { let [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const fmt = s => pd(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const fmtRange = (s,e) => s===e ? fmt(s) : fmt(s)+' → '+fmt(e);

function toast(msg, color) {
  let t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || '';
  t.style.color = color || '';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── SAVE STATE UI ─────────────────────────────────────────────────────────────
function setSaveState(state) {
  const dot = document.getElementById('save-dot');
  const txt = document.getElementById('save-txt');
  if (state === 'saving') { dot.style.background = 'var(--amber)'; txt.textContent = 'saving…'; }
  else if (state === 'saved') {
    dot.style.background = 'var(--green)'; txt.textContent = 'saved';
    document.getElementById('last-saved').textContent =
      'saved ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  } else { dot.style.background = 'var(--red)'; txt.textContent = 'error'; }
}

function setBadge(mode) {
  const b = document.getElementById('sync-badge');
  if (mode === 'kv')    { b.className = 'sync-badge kv';    b.textContent = '☁ KV synced'; }
  else if (mode==='local') { b.className = 'sync-badge local'; b.textContent = '⬡ local only'; }
  else                  { b.className = 'sync-badge err';   b.textContent = '⚠ sync error'; }
}

// ── KV STORAGE ────────────────────────────────────────────────────────────────
async function kvLoad() {
  if (!WORKER_URL) return null;
  try {
    const r = await fetch(WORKER_URL + '/data');
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function kvSave(data) {
  if (!WORKER_URL) return false;
  try {
    const r = await fetch(WORKER_URL + '/data', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data),
    });
    return r.ok;
  } catch { return false; }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setSaveState('saving');
  saveTimer = setTimeout(doSave, 700);
}

async function doSave() {
  const data = {events, nextId};
  // Always write localStorage instantly
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
  // Try KV if configured
  if (WORKER_URL) {
    const ok = await kvSave(data);
    setBadge(ok ? 'kv' : 'err');
  } else {
    setBadge('local');
  }
  setSaveState('saved');
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function load() {
  let data = null;

  // 1. Try KV first
  if (WORKER_URL) {
    data = await kvLoad();
    if (data) setBadge('kv');
  }

  // 2. Fall back to localStorage
  if (!data) {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) data = JSON.parse(raw);
    } catch {}
    setBadge(WORKER_URL ? 'err' : 'local');
  }

  // 3. Fall back to defaults
  if (!data || !data.events || data.events.length === 0) {
    data = {events: DEFAULT, nextId: 100};
  }

  events = data.events;
  nextId = data.nextId || 100;

  // Pre-fill worker URL if already saved
  if (WORKER_URL) document.getElementById('worker-url-input').value = WORKER_URL;

  document.getElementById('dateline').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  setSaveState('saved');
  conflicts();
  render();
}

// ── CONFIG PANEL ──────────────────────────────────────────────────────────────
function toggleConfig() {
  document.getElementById('config-panel').classList.toggle('open');
}

async function saveWorkerUrl() {
  const url = document.getElementById('worker-url-input').value.trim().replace(/\/$/, '');
  if (!url) { toast('Paste your Worker URL first.', 'var(--red)'); return; }
  localStorage.setItem(WORKER_URL_KEY, url);
  WORKER_URL = url;
  toast('Testing connection…', 'var(--amber)');
  const data = await kvLoad();
  if (data !== null) {
    setBadge('kv');
    toast('☁ KV connected! Syncing…', 'var(--teal)');
    await doSave();
    document.getElementById('config-panel').classList.remove('open');
  } else {
    setBadge('err');
    toast('Could not reach Worker — check the URL.', 'var(--red)');
  }
}

// ── CONFLICT DETECTION ────────────────────────────────────────────────────────
// Only flag same-type overlaps — road trips overlapping concerts is intentional
function conflicts() {
  const out = [];
  for (let i = 0; i < events.length; i++) {
    for (let j = i + 1; j < events.length; j++) {
      const a = events[i], b = events[j];
      // Skip if different types — being on a road trip during a concert is fine
      if (a.type !== b.type) continue;
      // Skip roadtrip vs roadtrip — nested trips are common
      if (a.type === 'roadtrip' || a.type === 'recon' || a.type === 'explore') continue;
      if (a.start <= b.end && b.start <= a.end) {
        out.push(`Conflict: "${a.name}" overlaps "${b.name}"`);
      }
    }
  }
  document.getElementById('conflicts').innerHTML =
    out.map(c => `<div class="conflict">${c}</div>`).join('');
}

// ── VIEW ──────────────────────────────────────────────────────────────────────
function setView(v) {
  view = v;
  document.getElementById('tab-up').classList.toggle('active', v === 'upcoming');
  document.getElementById('tab-cal').classList.toggle('active', v === 'calendar');
  render();
}

function toggleForm() { document.getElementById('qform').classList.toggle('open'); }

// ── NATURAL LANGUAGE PARSER ───────────────────────────────────────────────────
const MONTHS = {
  jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,
  january:0,february:1,march:2,april:3,june:5,july:6,august:7,
  september:8,october:9,november:10,december:11
};
const DAYS = {sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};

function parseDate(val) {
  const lower = val.toLowerCase();
  const today = new Date();

  // "April 14" or "Apr 14"
  let m = lower.match(/\b(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s+(\d{1,2})\b/);
  if (m) {
    const mn = MONTHS[m[1].slice(0,3)] ?? 0;
    const d = new Date(today.getFullYear(), mn, parseInt(m[2]));
    const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate()); if (d < todayMidnight) d.setFullYear(today.getFullYear() + 1);
    return ds(d);
  }

  // "14 April"
  let m2 = lower.match(/\b(\d{1,2})\s+(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\b/);
  if (m2) {
    const mn = MONTHS[m2[2].slice(0,3)] ?? 0;
    const d = new Date(today.getFullYear(), mn, parseInt(m2[1]));
    const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate()); if (d < todayMidnight) d.setFullYear(today.getFullYear() + 1);
    return ds(d);
  }

  // Day names
  let dm = lower.match(/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/);
  if (dm) {
    const target = DAYS[dm[1]], curr = today.getDay();
    let diff = target - curr;
    if (diff <= 0) diff += 7;
    const d = new Date(today);
    d.setDate(today.getDate() + diff);
    return ds(d);
  }

  if (lower.includes('tomorrow')) { const d = new Date(today); d.setDate(d.getDate()+1); return ds(d); }
  if (lower.includes('tonight') || lower.includes('today')) return ds(today);
  return ds(today);
}

function nlAdd() {
  const val = document.getElementById('nl').value.trim();
  if (!val) return;
  const lower = val.toLowerCase();

  let type = 'roadtrip';
  if (lower.match(/recon|research|cultural|market|reconnaisance/)) type = 'recon';
  else if (lower.match(/concert|show|gig|music|band|vinyl|stage|festival|amphitheatre|roxie/)) type = 'concert';
  else if (lower.match(/race|nascar|track|raceway|speedway|goodyear|darlington|talladega|indycar|formula/)) type = 'sport';
  else if (lower.match(/hornets|lakers|celtics|bulls|knicks|heat|warriors|nets|bucks|nba|basketball|hoops|fenway|baseball|mlb|stadium|arena|game|sport/)) type = 'sport';
  else if (lower.match(/flight|fly|airport|airline/)) type = 'flight';
  else if (lower.match(/hotel|stay|motel|airbnb|inn|quarters/)) type = 'hotel';
  else if (lower.match(/explore|museum|park|beach|hike|swim|walk|monument|gallery|smithsonian|quarter|market/)) type = 'explore';

  const d = parseDate(val);

  // Strip date words from name
  let name = val
    .replace(/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday|tonight|tomorrow|today)\b/gi, '')
    .replace(/\b(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s+\d{1,2}\b/gi, '')
    .replace(/\b\d{1,2}\s+(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\b/gi, '')
    .replace(/\s+/g, ' ').trim();
  if (name.length < 2) name = val;

  events.push({id: nextId++, name, start: d, end: d, type, loc: ''});
  document.getElementById('nl').value = '';
  scheduleSave();
  conflicts();
  render();
  toast(`Added: ${name} — ${fmt(d)}`);
}

function addForm() {
  const name  = document.getElementById('f-name').value.trim();
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value || start;
  const type  = document.getElementById('f-type').value;
  const loc   = document.getElementById('f-loc').value.trim();
  if (!name || !start) { toast('Need a name and start date.', 'var(--red)'); return; }
  events.push({id: nextId++, name, start, end, type, loc});
  ['f-name','f-start','f-end','f-loc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('qform').classList.remove('open');
  scheduleSave();
  conflicts();
  render();
  toast(`Added: ${name}`);
}

function del(id) {
  const e = events.find(ev => ev.id === id);
  events = events.filter(ev => ev.id !== id);
  scheduleSave();
  conflicts();
  render();
  if (e) toast(`Removed: ${e.name}`);
}

// ── CARD ──────────────────────────────────────────────────────────────────────
function card(e, muted) {
  const c   = TYPE_COLOR[e.type] || '#888';
  const bg  = TYPE_BG[e.type]   || '#222';
  const fg  = TYPE_FG[e.type]   || '#ccc';
  const lbl = TYPE_LABEL[e.type]|| e.type;
  return `<div class="event-card${muted?' muted':''}">
    <div class="event-stripe" style="background:${c}"></div>
    <div class="event-body">
      <div class="event-name">${e.name}</div>
      <div class="event-meta">${fmtRange(e.start, e.end)}</div>
      ${e.loc ? `<div class="event-loc">${e.loc}</div>` : ''}
    </div>
    <div class="event-right">
      <span class="type-pill" style="background:${bg};color:${fg}">${lbl}</span>
      <button class="del-btn" onclick="del(${e.id})">×</button>
    </div>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('view').innerHTML =
    view === 'upcoming' ? renderUpcoming() : renderCalendar();
  const today = ds(new Date());
  const up = events.filter(e => e.end >= today).length;
  document.getElementById('status').textContent = `${up} upcoming · ${events.length} total`;
}

function renderUpcoming() {
  const today = ds(new Date());
  const up   = [...events].filter(e => e.end >= today).sort((a,b) => a.start.localeCompare(b.start));
  const past = [...events].filter(e => e.end <  today).sort((a,b) => b.start.localeCompare(a.start));

  if (!up.length && !past.length)
    return '<p class="empty">No events yet — add one above.</p>';

  let html = '';

  // Group upcoming by month
  const groups = {};
  up.forEach(e => {
    const key = pd(e.start).toLocaleDateString('en-US',{month:'long',year:'numeric'});
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  Object.keys(groups).forEach(g => {
    html += `<div class="section-lbl">${g}</div>`;
    groups[g].forEach(e => html += card(e, false));
  });

  if (past.length) {
    html += `<div class="section-lbl">Past</div>`;
    past.slice(0, 8).forEach(e => html += card(e, true));
  }
  return html;
}

function renderCalendar() {
  const MONTH_NAMES = ['January','February','March','April','May','June',
    'July','August','September','October','November','December'];
  const todayStr = ds(new Date());

  let html = `<div class="cal-nav">
    <button onclick="calM--;if(calM<0){calM=11;calY--;}render()">‹</button>
    <span>${MONTH_NAMES[calM]} ${calY}</span>
    <button onclick="calM++;if(calM>11){calM=0;calY++;}render()">›</button>
  </div>
  <div class="cal-grid">`;

  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d =>
    html += `<div class="cal-lbl">${d}</div>`);
  html += `</div><div class="cal-grid">`;

  const first = new Date(calY, calM, 1).getDay();
  const dim   = new Date(calY, calM+1, 0).getDate();
  const total = Math.ceil((first + dim) / 7) * 7;

  for (let i = 0; i < total; i++) {
    const n = i - first + 1;
    if (n < 1 || n > dim) { html += `<div></div>`; continue; }
    const d    = `${calY}-${String(calM+1).padStart(2,'0')}-${String(n).padStart(2,'0')}`;
    const evts = events.filter(e => e.start <= d && e.end >= d);

    // Conflict on this day = same type, different event
    const types = evts.map(e => e.type);
    const hasConflict = types.filter(t => t !== 'roadtrip')
      .some((t, i, arr) => arr.indexOf(t) !== i);

    const cls = 'day'
      + (d === todayStr ? ' today' : '')
      + (hasConflict ? ' conflict-day' : (evts.length ? ' has-event' : ''));

    html += `<div class="${cls}"><div class="day-n">${n}</div>`;
    evts.slice(0,4).forEach(e =>
      html += `<span class="day-dot" style="background:${TYPE_COLOR[e.type]||'#888'}" title="${e.name}"></span>`);
    html += `</div>`;
  }

  html += `</div>`;

  // Events list for this month
  const mevts = [...events]
    .filter(e => { const [y,m] = e.start.split('-').map(Number); return m-1===calM && y===calY; })
    .sort((a,b) => a.start.localeCompare(b.start));

  if (mevts.length) {
    html += `<div class="section-lbl">Events this month</div>`;
    mevts.forEach(e => html += card(e, false));
  }
  return html;
}

load();
