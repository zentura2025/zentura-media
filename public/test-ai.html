<!DOCTYPE html>
<html lang="en">
<head>
    <style>
    body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
    
    #chat-box { 
        border: 1px solid #333; 
        padding: 15px; 
        max-width: 600px; 
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* The "Smart" Textarea */
    textarea { 
        width: 100%; 
        padding: 10px; 
        background: #111; 
        color: #00ffcc; /* That green you like */
        border: 1px solid #444; 
        border-radius: 4px;
        resize: none; 
        field-sizing: content; /* Auto-grows vertically as you type */
        min-height: 40px;
        font-family: inherit;
        box-sizing: border-box;
    }

    button { 
        align-self: flex-end;
        padding: 8px 20px; 
        cursor: pointer; 
        background: #0070f3; 
        color: white; 
        border: none; 
        border-radius: 4px;
    }

    .ghost {
        background: transparent;
        border: 1px solid white;
        color: white;
    }

    .button-container {
        display: flex;
        gap: 10px;
        align-self: flex-end;
    }

    #output { 
        margin-top: 20px; 
        line-height: 1.6; 
        color: #ddd; 
        white-space: pre-wrap; /* Ensures the AI's formatting stays pretty */
    }
</style>
</head>
<body>

    <h2>Zentura AI Explorer</h2>
    <div id="chat-box">
        <textarea id="userInput" placeholder="Ask me something... (Enter to send, Shift+Enter for new line)"></textarea>
        <div class="button-container">
            <button onclick="askAI()">Ask</button>
            <button class="ghost" onclick="clearAll()">Clear</button>
        </div>
        <div id="output">Response will appear here...</div>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('userInput').value;
            const outputDiv = document.getElementById('output');
            
            outputDiv.innerText = "Thinking...";

           try {
    const AI_ENDPOINT = "https://mystic-ai.zentura.workers.dev";

    const response = await fetch(`${AI_ENDPOINT}/ask=${encodeURIComponent(input)}`);
    const data = await response.json();

    outputDiv.innerText = data.response;
} catch (error) {
    outputDiv.innerText = "Error connecting to the worker.";
    console.error(error);
}

        }

        function clearAll() {
            document.getElementById('userInput').value = '';
            document.getElementById('output').innerText = 'Response will appear here...';
        }

        // Listen for the "Enter" key inside the textarea
        document.getElementById("userInput").addEventListener("keydown", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault(); // Prevents a literal new line from being added
                askAI(); // Runs your existing function
            }
        });
    </script>

</body>
</html>
