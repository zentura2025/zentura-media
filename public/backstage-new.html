<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zentura Backstage — New Post</title>
<link rel="icon" type="image/png" href="https://zentura.media/favicon.png">
<style>
  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 40px;
    max-width: 700px;
    margin: auto;
  }
  input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: #111;
    border: 1px solid #333;
    color: #fff;
    font-size: 1rem;
  }
  button {
    padding: 12px 20px;
    margin-right: 10px;
    background: #00eaff;
    border: none;
    color: #000;
    font-weight: bold;
    cursor: pointer;
  }
  button:hover {
    background: #ff00ff;
    color: #fff;
  }
  #result {
    margin-top: 20px;
    padding: 10px;
    background: #111;
    border: 1px solid #333;
  }
</style>
</head>
<body>

<h1>New Backstage Post</h1>

<label>API Secret (paste each time):</label>
<input id="secret" type="password" placeholder="Enter your API_SECRET">

<label>Title (optional):</label>
<input id="title" type="text" placeholder="Optional title">

<label>Body:</label>
<textarea id="body" rows="12" placeholder="Write your post here..."></textarea>

<button onclick="formatText()">Format</button>
<button onclick="publishPost()">Publish</button>

<div id="result"></div>

<script>
function formatText() {
  let text = document.getElementById("body").value;

  // Basic formatting: bold, italic, paragraphs
  text = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>");

  const paragraphs = text
    .split(/\n{2,}/)
    .map(p => `<p>${p.replace(/\n/g, "<br>")}</p>`)
    .join("\n");

  document.getElementById("body").value = paragraphs;
}

async function publishPost() {
  const secret = document.getElementById("secret").value.trim();
  const title = document.getElementById("title").value.trim();
  const body = document.getElementById("body").value.trim();

  if (!secret || !body) {
    document.getElementById("result").innerText = "Secret and body are required.";
    return;
  }

  const payload = title ? { title, body } : { body };

  const res = await fetch("/api/backstage/new", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + secret,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  const text = await res.text();
  document.getElementById("result").innerText = text;
}
</script>

</body>
</html>
